<svg xmlns="http://www.w3.org/2000/svg" width="1334" height="768" viewBox="0 0 1334 768">
  <rect width="100%" height="100%" fill="#f8f8f8"/>
  <rect x="38" y="30" width="1260" height="698" rx="18" ry="18" fill="#ffffff" stroke="#4a4a4a" stroke-width="1.2"/>

  <text x="60" y="78" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#111111">Time Between Consecutive Landings and Takeoffs</text>

  <!-- Legend -->
  <rect x="1038" y="70" width="235" height="102" rx="14" ry="14" fill="#ffffff" stroke="#4a4a4a" stroke-width="1.1"/>
  <rect x="1055" y="85" width="18" height="18" fill="#d95f02"/>
  <text x="1080" y="100" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#222222">Landing</text>
  <rect x="1055" y="112" width="18" height="18" fill="#1b9e77"/>
  <text x="1080" y="127" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#222222">Takeoff</text>
  <text x="1055" y="155" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#666666">Bars = avg / median / quartiles</text>

  <g transform="translate(0,-18)">
    <text x="60" y="122" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#666666">Spacing between two landings, and spacing between two takeoffs, measured within the same sampled day</text>

    <!-- Axes / grid -->
    <line x1="120" y1="650" x2="1230" y2="650" stroke="#b9b9b9" stroke-width="1.1"/>
    <line x1="120" y1="162" x2="120" y2="650" stroke="#d9d9d9" stroke-width="1"/>
    <line x1="120" y1="590" x2="1230" y2="590" stroke="#e6e6e6" stroke-width="1"/>
    <line x1="120" y1="530" x2="1230" y2="530" stroke="#e6e6e6" stroke-width="1"/>
    <line x1="120" y1="470" x2="1230" y2="470" stroke="#e6e6e6" stroke-width="1"/>
    <line x1="120" y1="410" x2="1230" y2="410" stroke="#e6e6e6" stroke-width="1"/>
    <line x1="120" y1="350" x2="1230" y2="350" stroke="#e6e6e6" stroke-width="1"/>
    <line x1="120" y1="290" x2="1230" y2="290" stroke="#e6e6e6" stroke-width="1"/>
    <line x1="120" y1="230" x2="1230" y2="230" stroke="#e6e6e6" stroke-width="1"/>

    <text x="50" y="424" transform="rotate(-90 50 424)" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#555555" text-anchor="middle">Minutes</text>
    <text x="83" y="655" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#777777">0.0</text>
    <text x="71" y="595" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#777777">1.4</text>
    <text x="71" y="535" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#777777">2.8</text>
    <text x="71" y="475" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#777777">4.2</text>
    <text x="71" y="415" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#777777">5.6</text>
    <text x="71" y="355" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#777777">7.0</text>

    <!-- Landing bars -->
    <rect x="178" y="477" width="76" height="173" fill="#d95f02" stroke="#8c3f00"/>
    <text x="216" y="469" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">3.9</text>
    <text x="216" y="700" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">Avg</text>

    <rect x="286" y="544" width="76" height="106" fill="#d95f02" stroke="#8c3f00"/>
    <text x="324" y="536" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">2.6</text>
    <text x="324" y="700" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">Med</text>

    <rect x="394" y="585" width="76" height="65" fill="#d95f02" stroke="#8c3f00"/>
    <text x="432" y="577" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">1.5</text>
    <text x="432" y="700" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">P25</text>

    <rect x="502" y="457" width="76" height="193" fill="#d95f02" stroke="#8c3f00"/>
    <text x="540" y="449" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">4.5</text>
    <text x="540" y="700" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">P75</text>

    <text x="360" y="732" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#111111">Landing</text>

    <!-- Takeoff bars -->
    <rect x="748" y="423" width="76" height="227" fill="#1b9e77" stroke="#0f6f57"/>
    <text x="786" y="415" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">5.3</text>
    <text x="786" y="700" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">Avg</text>

    <rect x="856" y="521" width="76" height="129" fill="#1b9e77" stroke="#0f6f57"/>
    <text x="894" y="513" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">3.0</text>
    <text x="894" y="700" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">Med</text>

    <rect x="964" y="565" width="76" height="85" fill="#1b9e77" stroke="#0f6f57"/>
    <text x="1002" y="557" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">2.0</text>
    <text x="1002" y="700" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">P25</text>

    <rect x="1072" y="391" width="76" height="259" fill="#1b9e77" stroke="#0f6f57"/>
    <text x="1110" y="383" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">6.0</text>
    <text x="1110" y="700" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#444444">P75</text>

    <text x="930" y="732" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#111111">Takeoff</text>
  </g>
</svg>
